# Gradle build properties for the Beam Android project.
# These apply to all subprojects in this build.

# AndroidX: opt-in to the AndroidX namespace (required since Android Gradle Plugin 4.x)
android.useAndroidX=true

# Non-transitive R class: each module only sees its own R fields (improves build performance,
# avoids accidental cross-module resource access)
android.nonTransitiveRClass=true

# JVM heap for the Gradle daemon — 2 GB is sufficient for a single-module Compose project.
# Increase to -Xmx4096m if incremental Kotlin compilation OOMs on large compilations.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enforce the Kotlin official code style (matches Android Studio defaults)
kotlin.code.style=official

# Enable Gradle configuration cache (speeds up repeated builds)
org.gradle.configuration-cache=true

# Enable parallel project execution
org.gradle.parallel=true

# Suppress compileSdk 35 warning with AGP 8.3
android.suppressUnsupportedCompileSdk=35
